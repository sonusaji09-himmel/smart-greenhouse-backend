services:
  influxdb:
    image: influxdb:2
    container_name: greenhouse-influxdb
    ports:
      - '8086:8086'
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: greenhouse123
      DOCKER_INFLUXDB_INIT_ORG: greenhouse
      DOCKER_INFLUXDB_INIT_BUCKET: greenhouse
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: greenhouse-demo-admin-token-fixed
      DOCKER_INFLUXDB_INIT_RETENTION: 7d
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    healthcheck:
      test: ['CMD', 'influx', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
